<div class="admin-container">
  <h2>Admin Panel - List New Room</h2>
  <p class="subtitle">Add a new room to Grand Paradise Hotel.</p>

  <div class="panels">
    <section class="panel">
      <h3>Room Management</h3>
      <p class="panel-subtitle">Add a new room or edit existing ones.</p>

      <form (ngSubmit)="saveRoom()" class="room-form">
        <div class="form-row">
          <label>Name</label>
          <input type="text" [(ngModel)]="roomForm.name" name="name" required />
        </div>

        <div class="form-row">
          <label>Description</label>
          <textarea [(ngModel)]="roomForm.description" name="description" rows="2"></textarea>
        </div>

        <div class="form-row-inline">
          <div>
            <label>Price / Night</label>
            <input type="number" [(ngModel)]="roomForm.pricePerNight" name="pricePerNight" min="0" required />
          </div>
          <div>
            <label>Capacity</label>
            <input type="number" [(ngModel)]="roomForm.capacity" name="capacity" min="1" required />
          </div>
        </div>

        <div class="form-row">
          <label>Room Type</label>
          <select [(ngModel)]="roomForm.type" name="type" required>
            <option value="SINGLE">Single</option>
            <option value="DOUBLE">Double</option>
            <option value="KING">King</option>
            <option value="SUITE">Suite</option>
          </select>
        </div>

        <div class="form-row">
          <label>Room Image</label>
          <input type="file" accept="image/*" (change)="onRoomImageSelected($event)" />
          <small *ngIf="uploadingImage" class="info">Uploading image...</small>
          <small *ngIf="roomForm.imageUrl && !uploadingImage" class="info">Image uploaded.</small>
          <small *ngIf="imageUploadError" class="error">{{ imageUploadError }}</small>
        </div>

        <div class="actions">
          <button type="submit">{{ roomForm.id ? 'Update Room' : 'Add Room' }}</button>
          <button type="button" class="secondary" (click)="resetRoomForm()" *ngIf="roomForm.id">Cancel Edit</button>
        </div>
      </form>
    </section>
  </div>

  <p class="msg" *ngIf="message">{{ message }}</p>
  <p class="error" *ngIf="error">{{ error }}</p>
</div>
