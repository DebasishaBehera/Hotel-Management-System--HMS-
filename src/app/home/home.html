<div class="home-container">
  <header class="header">
    <div class="header-overlay">
      <p class="badge">Welcome to</p>
      <h1>{{ hotelName }}</h1>
      <p class="subtitle">Comfort, elegance, and premium hospitality in every stay.</p>
      <div class="header-actions">
        <button class="btn-book" [routerLink]="['/rooms']">Book Now</button>
        <button class="btn-outline" [routerLink]="['/about']">Explore More</button>
      </div>
    </div>
  </header>

  <section class="features">
    <h2>Our Facilities</h2>
    <p class="features-subtitle">Everything you need for a relaxing and memorable getaway.</p>
    <div class="features-grid">
      <div class="feature-card" *ngFor="let f of features">
        <div class="icon">{{ f.icon }}</div>
        <h3>{{ f.title }}</h3>
        <p>{{ f.desc }}</p>
      </div>
    </div>
  </section>

</div>
