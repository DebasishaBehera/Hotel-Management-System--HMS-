<nav class="navbar">
    <div class="nav-container">
        <div class="logo">🏨 Grand Paradise</div>

        <button class="menu-toggle" (click)="toggleMenu()">☰</button>

        <ul class="nav-links" [class.active]="isMenuOpen">
            <li><a routerLink="/" routerLinkActive="active" (click)="isMenuOpen=false">Home</a></li>
            <li><a routerLink="/rooms" routerLinkActive="active" (click)="isMenuOpen=false">Rooms</a></li>
            <li><a routerLink="/about" routerLinkActive="active" (click)="isMenuOpen=false">About</a></li>
            <li *ngIf="!isAdmin()"><a routerLink="/contact" routerLinkActive="active" (click)="isMenuOpen=false">Contact</a></li>
            <!-- Admin links: first go to admin login, then to admin panel when logged in as admin -->
            <li *ngIf="!isAdmin()"><a routerLink="/admin-login" routerLinkActive="active" (click)="isMenuOpen=false">Admin</a></li>
            <li *ngIf="isAdmin()"><a routerLink="/admin" routerLinkActive="active" (click)="isMenuOpen=false">Admin Panel</a></li>
            <li *ngIf="!isLoggedIn()"><a routerLink="/login" routerLinkActive="active" class="login-btn" (click)="isMenuOpen=false">Login</a></li>
            <li *ngIf="!isLoggedIn()"><a routerLink="/signup" routerLinkActive="active" class="login-btn" (click)="isMenuOpen=false">Signup</a></li>
            <li *ngIf="isLoggedIn()"><a (click)="logout()" class="login-btn">Logout</a></li>

        </ul>
    </div>
</nav>
